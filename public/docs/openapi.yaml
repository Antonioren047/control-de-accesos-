openapi: 3.0.3
info:
  title: API del Sistema de Vigilancia
  version: 3.0.0
  description: Fase 3. Consulta el contrato canónico actualizado en docs/api/openapi.yaml.
servers:
  - url: /control-de-accesos/public/api
paths:
  /health:
    get:
      summary: Consultar estado del servicio
      responses: {'200': {description: Servicio disponible}}
  /auth/login:
    post:
      summary: Iniciar sesión
      responses: {'200': {description: Sesión iniciada}, '401': {description: Credenciales incorrectas}, '429': {description: Espera progresiva}}
  /auth/me:
    get:
      summary: Consultar sesión y permisos
      responses: {'200': {description: Sesión activa}, '401': {description: No autenticado}}
  /auth/logout:
    post:
      summary: Cerrar sesión
      responses: {'200': {description: Sesión cerrada}}
  /auth/password:
    post:
      summary: Cambiar contraseña propia
      responses: {'200': {description: Contraseña actualizada}, '422': {description: Datos inválidos}}
  /auth/theme:
    post:
      summary: Guardar tema del usuario
      responses: {'200': {description: Tema guardado}}
  /auth/sessions:
    get:
      summary: Consultar sesiones activas propias
      responses: {'200': {description: Sesiones activas}, '403': {description: Sin permiso}}
  /auth/sessions/revoke:
    post:
      summary: Revocar otra sesión propia
      responses: {'200': {description: Sesión revocada}, '404': {description: Sesión no encontrada}}
  /users/password-reset:
    post:
      summary: Restablecer contraseña con permiso
      responses: {'200': {description: Contraseña restablecida}, '403': {description: Sin permiso}}
  /authorization/roles:
    get:
      summary: Consultar matriz de permisos por rol
      responses: {'200': {description: Matriz disponible}, '403': {description: Sin permiso permissions.manage}}
    post:
      summary: Activar o desactivar un permiso para un rol
      responses: {'200': {description: Permiso actualizado}, '403': {description: Sin permiso}, '422': {description: Datos inválidos}}
  /organization/clients:
    get: {summary: Listar clientes autorizados, responses: {'200': {description: Catálogo disponible}, '403': {description: Sin permiso}}}
  /organization/locations:
    get: {summary: Listar lugares autorizados, responses: {'200': {description: Catálogo disponible}, '403': {description: Sin permiso}}}
  /organization/access-points:
    get: {summary: Listar puntos autorizados, responses: {'200': {description: Catálogo disponible}, '403': {description: Sin permiso}}}
  /organization/units:
    get: {summary: Listar unidades autorizadas, responses: {'200': {description: Catálogo disponible}, '403': {description: Sin permiso}}}
  /organization/residents:
    get: {summary: Listar residentes autorizados, responses: {'200': {description: Catálogo disponible}, '403': {description: Sin permiso}}}
  /organization/create:
    post: {summary: Crear registro organizacional, responses: {'201': {description: Registro creado}, '403': {description: Fuera de alcance}, '422': {description: Datos inválidos}}}
  /organization/status:
    post: {summary: Cambiar estado lógico, responses: {'200': {description: Estado actualizado}, '403': {description: Fuera de alcance}}}
