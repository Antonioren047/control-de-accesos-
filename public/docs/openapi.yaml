openapi: 3.0.3
info:
  title: API del Sistema de Vigilancia
  version: 1.0.0
  description: Contrato inicial de la Fase 1.
servers:
  - url: /control-de-accesos/public/api
paths:
  /health:
    get:
      summary: Consultar estado del servicio
      operationId: getHealth
      responses:
        '200':
          description: Servicio disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
components:
  schemas:
    SuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success: {type: boolean, example: true}
        message: {type: string}
        data: {type: object}
    ErrorResponse:
      type: object
      required: [success, message, errors]
      properties:
        success: {type: boolean, example: false}
        message: {type: string}
        errors: {type: object}
